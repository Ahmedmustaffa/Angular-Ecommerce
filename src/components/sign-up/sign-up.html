<div class="container mt-5" style="max-width: 500px;">
  <h2 class="mb-4">Sign Up</h2>
  <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
    
    <div class="mb-3">
      <label class="form-label">Username</label>
      <input type="text" class="form-control" formControlName="username">
      <div *ngIf="username?.invalid && username?.touched" class="text-danger small mt-1">
        <span *ngIf="username?.errors?.['required']">Username is required.</span>
        <span *ngIf="username?.errors?.['pattern']">Must be at least 3 letters.</span>
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" class="form-control" formControlName="email">
      <div *ngIf="email?.invalid && email?.touched" class="text-danger small mt-1">
        Valid email is required.
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label">Password</label>
      <input type="password" class="form-control" formControlName="password">
      <div *ngIf="password?.invalid && password?.touched" class="text-danger small mt-1">
        Password is required.
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label">Confirm Password</label>
      <input type="password" class="form-control" formControlName="confirmedPassword">
      <div *ngIf="registerForm?.errors?.['unMatchedPassword'] && confirmedPassword?.touched" class="text-danger small mt-1">
        Passwords do not match.
      </div>
    </div>

    <button type="submit" class="btn btn-primary w-100" [disabled]="registerForm.invalid">Register</button>
    
    <div class="mt-3 text-center">
      <p>Already have an account? <a routerLink="/login">Login here</a></p>
    </div>
  </form>
</div>
