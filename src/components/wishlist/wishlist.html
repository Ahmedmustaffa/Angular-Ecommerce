<div class="container py-4">
  <div class="d-flex align-items-center mb-4 border-bottom pb-3">
    <h2 class="mb-0">My Wishlist ❤️</h2>
  </div>

  @if (wishlistService.wishlistCount() > 0) {
    <app-products [products]="wishlistService.wishlistItems()"></app-products>
  } @else {
    <div class="text-center py-5 bg-light rounded-4 border border-dashed text-secondary mt-4">
      <h3 class="fw-bold text-dark mb-3">Your wishlist is empty</h3>
      <p class="mb-4">Looks like you haven't added anything to your wishlist yet.</p>
      <a class="btn btn-primary btn-lg shadow-sm" href="/products">Browse Products</a>
    </div>
  }
</div>
